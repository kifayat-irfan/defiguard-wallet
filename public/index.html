<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeFiGuard Wallet</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #0f0f1a; color: white; }
    button { background: #6c63ff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: white; }
    .card { background: #1a1a2e; padding: 20px; border-radius: 12px; margin: 15px 0; }
    #status { color: #6c63ff; margin-top: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>🔐 DeFiGuard Wallet</h1>

  <div class="card">
    <button id="connectBtn">Connect MetaMask</button>
    <p>Address: <span id="address">Not connected</span></p>
    <p>Balance: <span id="balance">-</span> ETH</p>
  </div>

  <div class="card">
    <h3>Send ETH</h3>
    <input id="toAddress" placeholder="Recipient Address (0x...)" />
    <input id="amount" placeholder="Amount in ETH (e.g. 0.001)" />
    <button id="sendBtn">Send ETH</button>
    <p id="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
